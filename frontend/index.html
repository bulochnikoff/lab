<!DOCTYPE html>
<html>
<head>
    <title>Мой сервис</title>
</head>
<body>
    <h1>Сообщение от бэкенда:</h1>
    <div id="message"></div>
    <script>
        fetch('http://localhost:5000/')
            .then(response => response.text())
            .then(data => {
                document.getElementById('message').innerText = data;
            });
    </script>
</body>
</html>
